apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: __SERVICE_NAME__
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: __IMAGE__
          ports:
            - name: http1
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: 0.0.0.0
            - name: NEXT_PUBLIC_API_BASE_URL
              value: __API_BASE_URL__
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: __DATABASE_SECRET_NAME__
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
  traffic:
    - latestRevision: true
      percent: 100
